name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open the menu bar app
        2. Select ...
        3. Toggle ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 26.5.1"
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: "v0.1.0"
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Add screenshots, logs, or the error message if available.
