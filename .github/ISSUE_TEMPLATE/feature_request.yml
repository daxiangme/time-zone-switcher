name: Feature request
description: Suggest an improvement or new workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Describe any alternatives or workarounds.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - UI
        - Time zone switching behavior
        - Packaging or installation
        - Localization
        - Documentation
        - Other
    validations:
      required: true
