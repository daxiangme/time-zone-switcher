name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build release archive
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}" Scripts/package_release.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          zip_path="$(ls dist/releases/*.zip)"
          sha_path="${zip_path}.sha256"
          notes_file="RELEASE_NOTES_${TAG_NAME}.md"

          if [ ! -f "$notes_file" ]; then
            notes_file="CHANGELOG.md"
          fi

          gh release create "$TAG_NAME" \
            "$zip_path" \
            "$sha_path" \
            --title "Time Zone Switcher ${TAG_NAME}" \
            --notes-file "$notes_file" \
            --latest
