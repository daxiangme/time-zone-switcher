<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Time Zone Switcher menu bar popover preview</title>
  <desc id="desc">A macOS style menu bar popover showing current and target time zones, search, and restore controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f8f8"/>
      <stop offset="1" stop-color="#dbecef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#17313a" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="960" height="620" fill="#eef5f6"/>
  <rect x="0" y="0" width="960" height="34" fill="#f8fbfb"/>
  <circle cx="804" cy="17" r="5" fill="#5b6569"/>
  <circle cx="828" cy="17" r="5" fill="#5b6569"/>
  <circle cx="852" cy="17" r="5" fill="#5b6569"/>

  <g filter="url(#shadow)">
    <rect x="250" y="62" width="460" height="520" rx="28" fill="url(#bg)" stroke="#c8d2d5"/>
    <g transform="translate(282 86)">
      <circle cx="32" cy="32" r="32" fill="#dfe7e8"/>
      <path d="M32 16v18h-14" fill="none" stroke="#667174" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="32" cy="32" r="20" fill="none" stroke="#667174" stroke-width="3"/>
      <text x="76" y="26" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#263236">Time Zone</text>
      <text x="76" y="52" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#657175">System time</text>
      <rect x="352" y="8" width="72" height="44" rx="22" fill="#d5dddf"/>
      <circle cx="376" cy="30" r="18" fill="#ffffff" stroke="#c3cdd0"/>
    </g>

    <line x1="250" y1="166" x2="710" y2="166" stroke="#c8d2d5"/>

    <g transform="translate(282 202)">
      <rect width="396" height="116" rx="14" fill="#dfe7e8"/>
      <text x="42" y="36" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#657175">Current</text>
      <text x="116" y="34" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#263236">China Standard Time</text>
      <text x="116" y="58" font-family="SFMono-Regular, ui-monospace, Menlo, monospace" font-size="15" fill="#657175">Asia/Shanghai</text>
      <text x="42" y="86" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#657175">Target</text>
      <text x="116" y="84" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#263236">Pacific Time</text>
      <text x="116" y="108" font-family="SFMono-Regular, ui-monospace, Menlo, monospace" font-size="15" fill="#657175">America/Los_Angeles</text>
    </g>

    <g transform="translate(282 346)">
      <rect width="396" height="48" rx="12" fill="#d5dddf"/>
      <text x="18" y="30" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#657175">Search time zones</text>
    </g>

    <g transform="translate(302 424)">
      <circle cx="12" cy="12" r="8" fill="none" stroke="#9ba6a9" stroke-width="2"/>
      <text x="46" y="10" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#263236">Japan Standard Time</text>
      <text x="46" y="32" font-family="SFMono-Regular, ui-monospace, Menlo, monospace" font-size="14" fill="#657175">Asia/Tokyo</text>

      <circle cx="12" cy="74" r="8" fill="none" stroke="#9ba6a9" stroke-width="2"/>
      <text x="46" y="72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#263236">United Kingdom Time</text>
      <text x="46" y="94" font-family="SFMono-Regular, ui-monospace, Menlo, monospace" font-size="14" fill="#657175">Europe/London</text>
    </g>

    <line x1="250" y1="532" x2="710" y2="532" stroke="#c8d2d5"/>
    <text x="300" y="560" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#657175">Refresh</text>
    <text x="624" y="560" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#657175">Quit</text>
  </g>
</svg>
